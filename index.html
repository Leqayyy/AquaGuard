<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

<nav class="navbar navbar-expand-sm bg-dark navbar-dark p-1">
  <div class="container">
    <a class="navbar-brand" href="#"><h2 class="mt-1">AquaGuard™</h2></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" aria-current="page" href=aboutus.html?access=true><h3 class="mt-2">About Us</h3></a>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 mb-5">
  <p id="group2" class="lead">AquaGuard is an application in which you can report anything correlated to water, such as water leaks, problems with pipes, puddles that contain electricity due to wrong electricity transmission and etc. 
  </p>
</div>

<div id="formbox" class="container p-5 form-check form-switch d-flex align-items-center mb-3">
  <form id="newsletterForm">
    <h3 id="formtext">Log In to AquaGuard</h3><br>
    <input id="name" type="text" class="form-control" placeholder="Enter full name" required><br>
    <input id="number" type="number" class="form-control" placeholder="Enter phone number" required><br>
    <input id="password" type="password" class="form-control" placeholder="Enter password " required><br>
    <input id="email" type="email" class="form-control" placeholder="Enter email address" required><br>
    <label for="id"><h3><small>I agree to the terms and services.</small></h3></label>
    <input class="form-check-input form-switch m-0" type="checkbox" id="agree" required><br><br><br>
    <button class="btn btn-outline-light mx-auto d-block" type="submit">Log in</button>
    <div class="text-center">
    <label for="id">
        <h6><small>Don't have an account? <a href="#" style="color: blue; text-decoration: underline;">Sign Up</a></small></h6>
    </label>
</div>
  </div>
  </form>
</div>
<script>
  const form = document.getElementById('newsletterForm');
  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const address = document.getElementById('number').value;
    const password = document.getElementById('password').value;
    const email = document.getElementById('email').value;
    const agree = document.getElementById('agree').checked;

    if (!agree) {
      alert('You must agree to the terms!');
      return;
    }
    alert('Account log in successful!');
    window.location.href = 'main.html?access=true';
  });
</script>



<style>
  
    .form-control:focus {
      box-shadow:none;
      border-color: #ffffff;
    }
    .text-center {
    text-align: center;
    }   
    .form-control::placeholder{
      color: #aeaeae;
    }
    #formtext, #rangeValue, #group2, #group3, #ediz{
      color: #ffffff;
    }
    #group, #phone{
      background-color: rgba(5, 55, 165, 0);
    }
    #formbox{
      background-color: rgba(255, 255, 255, 0.35);
      border-radius: 2vh;
      display: flex;
      justify-content: center;
      align-items: center;
      width: fit-content;
      width: 1000px;
      max-width: 32%;
      height: 515px;

    }
    body{
      background-image: linear-gradient(to bottom, #011f49, #000000);
    }

</style>
